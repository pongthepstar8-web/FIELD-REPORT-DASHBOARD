
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Report Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(13,110,253,.18), transparent 36%),
        linear-gradient(135deg, #eef4ff 0%, #f8fafc 50%, #eef2f7 100%);
      color: #0f172a;
      padding: 28px 18px;
    }

    /* Header */
    .app-header {
      text-align: center;
      margin-bottom: 6px;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #0d6efd, #06b6d4, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 8px 20px rgba(13,110,253,.18);
    }

    .app-subtitle {
      text-align: center;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: .3px;
    }

    /* Tabs */
    .menu-tabs {
      display: flex;
      gap: 14px;
      max-width: 920px;
      margin: 0 auto 26px;
      padding: 7px;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 14px 38px rgba(15,23,42,.13);
    }

    .tab-btn {
      flex: 1;
      height: 68px;
      border: 1px solid rgba(148,163,184,.25);
      border-radius: 19px;
      background: rgba(255,255,255,.9);
      color: #334155;
      font-size: 20px;
      font-weight: 850;
      cursor: pointer;
      transition: .25s ease;
    }

    .tab-btn:hover {
      transform: translateY(-2px);
      background: #fff;
      box-shadow: 0 10px 25px rgba(15,23,42,.13);
    }

    .tab-btn.active {
      color: #fff;
      border: none;
      background: linear-gradient(135deg, #0d6efd, #00c6ff);
      box-shadow: 0 13px 30px rgba(13,110,253,.35);
    }

    /* Page */
    .page {
      display: none;
      animation: fadeIn .22s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Main Card */
    .container {
      max-width: 820px;
      margin: 0 auto;
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(203,213,225,.9);
      border-radius: 28px;
      padding: 30px 30px 34px;
      box-shadow:
        0 22px 65px rgba(15,23,42,.15),
        inset 0 1px 0 rgba(255,255,255,.8);
    }

    .section-title {
      text-align: center;
      margin: 0 0 24px;
      font-size: 30px;
      font-weight: 900;
      color: #0d6efd;
      letter-spacing: .5px;
    }

    .field-label {
      display: block;
      margin: 12px 0 7px;
      font-size: 14px;
      font-weight: 850;
      color: #334155;
    }

    textarea,
    select,
    input {
      width: 100%;
      border-radius: 16px;
      border: 1.5px solid #dbeafe;
      background: #ffffff;
      color: #0f172a;
      font-size: 15px;
      line-height: 1.55;
      transition: .2s ease;
    }

    textarea {
      padding: 16px;
      resize: vertical;
    }

    select {
      height: 54px;
      padding: 0 14px;
      font-weight: 750;
      color: #334155;
      margin-bottom: 12px;
      cursor: pointer;
    }

    textarea:focus,
    select:focus,
    input:focus {
      outline: none;
      border-color: #0d6efd;
      box-shadow: 0 0 0 4px rgba(13,110,253,.12);
    }

    .input-area {
      min-height: 220px;
    }

    .output-area {
      min-height: 360px;
      background: linear-gradient(180deg, #f8fafc, #ffffff);
      border: 1.5px solid #cbd5e1;
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      color: #0f172a;
      box-shadow: inset 0 2px 10px rgba(15,23,42,.04);
    }

    /* Buttons */
    .top-btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr 120px;
      gap: 12px;
      margin: 16px 0 20px;
    }

    .btn-top {
      height: 56px;
      padding: 0 14px;
      border-radius: 16px;
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 850;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: .22s ease;
      box-shadow: 0 10px 24px rgba(15,23,42,.16);
    }

    .btn-primary {
      background: linear-gradient(135deg, #0d6efd, #00b4ff);
    }

    .btn-success {
      background: linear-gradient(135deg, #16a34a, #4ade80);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #fb7185);
    }

    .btn-top:hover {
      transform: translateY(-3px);
      filter: brightness(1.04);
      box-shadow: 0 15px 32px rgba(15,23,42,.22);
    }

    .btn-top:active {
      transform: scale(.97);
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
    }

    /* Mobile */
    @media (max-width: 720px) {
      body {
        padding: 18px 10px;
      }

      .app-header {
        font-size: 27px;
        letter-spacing: 1.5px;
      }

      .app-subtitle {
        font-size: 13px;
      }

      .menu-tabs {
        flex-direction: column;
        max-width: 100%;
      }

      .tab-btn {
        height: 58px;
        font-size: 18px;
      }

      .container {
        padding: 22px 16px 26px;
        border-radius: 22px;
      }

      .section-title {
        font-size: 25px;
      }

      .top-btn-group {
        grid-template-columns: 1fr;
      }

      .input-area {
        min-height: 180px;
      }

      .output-area {
        min-height: 280px;
      }
    }
  </style>
</head>

<body>
  <div class="app-header">FIELD REPORT DASHBOARD</div>
  <div class="app-subtitle">Field Operation / Network Maintenance Tool</div>

  <div class="menu-tabs">
    <button class="tab-btn active" onclick="showPage('edsPage', this)">
      📋 EDS REPORT
    </button>

    <button class="tab-btn" onclick="showPage('ospPage', this)">
      🛠 OSP REPORT
    </button>
  </div>

  <!-- EDS PAGE -->
  <div id="edsPage" class="container page active">
    <h2 class="section-title">📋 รายงาน EDS</h2>

    <label class="field-label">ข้อมูลใบงาน EDS</label>
    <textarea
      id="rawText"
      class="input-area"
      rows="12"
      placeholder="วางข้อมูล Job ตรงนี้"
    ></textarea>

    <div class="top-btn-group">
      <button onclick="parseText()" class="btn-top btn-primary">
        📥 แปลงข้อมูล
      </button>

      <button onclick="copyEDSReport()" class="btn-top btn-success">
        📋 คัดลอกรายงาน
      </button>

      <button onclick="clearEDS()" class="btn-top btn-danger">
        🗑 Clear
      </button>
    </div>

    <label class="field-label">รายงาน EDS ที่แปลงแล้ว</label>
    <textarea
      id="edsReport"
      class="output-area"
      rows="25"
      placeholder="รายงาน EDS ที่แปลงแล้ว"
    ></textarea>
  </div>

  <!-- OSP PAGE -->
  <div id="ospPage" class="container page">
    <h2 class="section-title">👷 OSP OUTSOURCING</h2>

    <label class="field-label">ทีมปฏิบัติงาน</label>
    <select id="teamSelect">
      <option value="">-- เลือกทีม --</option>

      <option value="MA UBN1 :: ทวีศักดิ์ โพธิ์พงษ์ :: 0649255124">
        MA UBN1 :: ทวีศักดิ์ โพธิ์พงษ์ :: 0649255124
      </option>

      <option value="MA SSK1 :: วิรัตน์ จำปาหอม :: 0830896061">
        MA SSK1 :: วิรัตน์ จำปาหอม :: 0830896061
      </option>

      <option value="MA BKN1 :: เชี่ยวชาญ มะณีวรรณ :: 0988055009">
        MA BKN1 :: เชี่ยวชาญ มะณีวรรณ :: 0988055009
      </option>
    </select>

    <label class="field-label">ข้อมูลใบงาน OSP จาก TTSM</label>
    <textarea
      id="ospText"
      class="input-area"
      rows="10"
      placeholder="วางใบงาน OSP จาก TTSM"
    ></textarea>

    <div class="top-btn-group">
      <button onclick="parseOSP()" class="btn-top btn-primary">
        📥 แปลงข้อมูล
      </button>

      <button onclick="copyOSPReport()" class="btn-top btn-success">
        📋 คัดลอกรายงาน
      </button>

      <button onclick="clearOSP()" class="btn-top btn-danger">
        🗑 Clear
      </button>
    </div>

    <label class="field-label">รายงาน OSP ที่แปลงแล้ว</label>
    <textarea
      id="ospReport"
      class="output-area"
      rows="35"
      placeholder="รายงานที่แปลงแล้วจะแสดงที่นี่"
    ></textarea>
  </div>

  <div class="footer">


    <script>
      function checkFactoryAuth() {
        const auth = JSON.parse(localStorage.getItem('factoryAuth'));

        if (!auth) {
          location.replace(
            'https://pongthepstar8-web.github.io/tool-launcher/'
          );
          return false;
        }

        const expireTime = 8 * 60 * 60 * 1000; // 8 ชั่วโมง

        if (Date.now() - auth.loginTime > expireTime) {
          localStorage.clear();

          location.replace(
            'https://pongthepstar8-web.github.io/tool-launcher/'
          );
          return false;
        }

        return true;
      }

      checkFactoryAuth();
      function parseOSP() {
        const team = document.getElementById('teamSelect').value;
        const text = document.getElementById('ospText').value;

        // JB
        const job = (text.match(/JB\d{2}-\d+/i) || [''])[0];

        // Title
        const title = (text.match(/Title\s*:\s*([\s\S]*?)JB ID\s*:/) || [
          '',
          '',
        ])[1]
          .replace(/\n/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();

        // Priority
        const priority = (text.match(/Priority\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();
        let issue = 'เข้าตรวจสอบแก้ไขเหตุขัดข้อง';

        const titleUpper = title.toUpperCase();

        if (titleUpper.includes('PON') && titleUpper.includes('HIGH LOSS')) {
          issue = 'เข้าตรวจสอบ PON High Loss';
        } else if (titleUpper.includes('HIGH LOSS')) {
          issue = 'เข้าตรวจสอบ High Loss';
        } else if (titleUpper.includes('PON DOWN')) {
          issue = 'เข้าตรวจสอบ PON Down';
        } else if (titleUpper.includes('SPLITTER DOWN')) {
          issue = 'เข้าตรวจสอบ Splitter Down';
        }

        // ตรวจค่า Rx
        const rxMatch = title.match(/Rx\s*[-:]\s*(-?\d+\.?\d*)/i);

        if (rxMatch) {
          const rxValue = parseFloat(rxMatch[1]);

          // Rx -29 ลงไป = High Loss
          if (rxValue <= -29) {
            issue = 'เข้าตรวจสอบ High Loss';
          }
        }
        // Start
        const start = (text.match(/Assign Date\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();

        // Finish
        const finish = (text.match(/To be Finish before\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();

        let gps = '';

        const coordMatches = [
          ...title.matchAll(
            /([A-Z0-9_\/]+)?[\[\(]\s*(\d+\.\d+\s*,\s*\d+\.\d+)\s*[\]\)]/gi
          ),
        ];

        if (coordMatches.length > 0) {
          gps = coordMatches
            .map((c) => {
              const pointName = c[1] || 'GPS';

              return `📍 ${pointName} : ${c[2]}`;
            })
            .join('\n');
        }

        const now = new Date();

        const assignTime = now
          .toLocaleString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false,
          })
          .replace(',', '')
          .replace(/ /g, '-')
          .replace(/-(\d{2}:\d{2})$/, ' $1');

        const report = `👷 OSP OUTSOURCING NQM 
TEAM :: ${team || '[เลือกทีม]'}
━━━━━━━━━━━━━━━━━━━━━━
ใบงานที่ :: [ระบุ]
JB ID : ${job}
Title : ${title}
Priority : ${priority}
${issue}
${gps}
*รายละเอียด เช่น แผนที่ Igis จะส่งใน เมนู OSP บน TTSM ครับ
━━━━━━━━━━━━━━━━━━━━━━
:: ใบงานเริ่มต้น : ${start}
:: ใบงานเสร็จสิ้น : ${finish}
:: จ่ายงาน : ${assignTime}
:: รับงาน : [ระบุ]
:: เดินทาง : [ระบุ]
:: ระยะทาง : [ระบุ] km.
:: On Site : [ระบุ]
━━━━━━━━━━━━━━━━━━━━━━
:: ผล test OTDR : [ระบุ]
:: รายละเอียดเพิ่มเติม : [ระบุ]
:: เจอแผล : [ระบุ]
:: สาเหตุเสีย : [ระบุ]
:: เริ่มแก้ไข : [ระบุ]
:: แก้ไขโดย : [ระบุ]
━━━━━━━━━━━━━━━━━━━━━━
:: เริ่มตัดต่อหัวที่ 1 : [ระบุ]
:: พิกัดหัวต่อที่ 1 : [ระบุ]
:: เริ่มตัดต่อหัวที่ 2 : [ระบุ]
:: พิกัดหัวต่อที่ 2 : [ระบุ]
:: เริ่มตัดต่อหัวที่ 3 : [ระบุ]
:: พิกัดหัวต่อที่ 3 : [ระบุ]
:: เริ่มตัดต่อหัวที่ 4 : [ระบุ]
:: พิกัดหัวต่อที่ 4 : [ระบุ]
━━━━━━━━━━━━━━━━━━━━━━
:: ไม่มี Alarm (Done Job) : [ระบุ]
:: โยกคอร์ใช้งาน : [ระบุ]
:: สาเหตุล่าช้า : [ระบุ]
━━━━━━━━━━━━━━━━━━━━━━
📦 รายการ Material ที่ใช้งาน
- Cable ARSS 12 core =
- Closure 12 core = 2
- B-LASHED Cable Support =
- Protective sleeve =
- PVC TAPE =
- Preformed Guy Grip Deadend =
- Preformed (ปีกนก) =
- Machine Bolt 5/8" x 12" =
- Patch cord =
- Pigtail =
- Connector =`;

        document.getElementById('ospReport').value = report;
      }
      function copyOSPReport() {
        const text = document.getElementById('ospReport').value;

        navigator.clipboard.writeText(text);

        alert('✅ คัดลอกรายงานแล้ว');
      }
      function clearOSP() {
        document.getElementById('teamSelect').selectedIndex = 0;

        document.getElementById('ospText').value = '';

        document.getElementById('ospReport').value = '';

        alert('✅ ล้างข้อมูลแล้ว');
      }
    </script>

    <script>
      function parseText() {
        const text = document.getElementById('rawText').value;

        // JOB
        const job = (text.match(/JB\d{2}-\d+/) || [''])[0];

        // Title
        const title = (text.match(/Title\s*:\s*([\s\S]*?)JB ID/) || ['', ''])[1]
          .replace(/\n/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();

        // Assign To
        const name = (text.match(/Assign To\s*:\s*(.+)/) || ['', ''])[1].trim();

        // Tel
        const telSection = text.split('Assign To')[1] || '';

        const tel = (telSection.match(/0[689]\d{8}/) || [''])[0];

        // Created
        const created = (text.match(/Assign Date\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();

        // Finish
        const finish = (text.match(/To be Finish before\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();
        // Priority
        const priority = (text.match(/Priority\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();

        // Problem Type
        const problemType = (text.match(/Problem Type\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();

        // Problem Service
        const problemService = (text.match(/Problem Service\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();

        // Subsystem
        const subsystem = (text.match(/Subsystem\s*:\s*(.+)/) || [
          '',
          '',
        ])[1].trim();
        const assignBy = (text.match(
          /Assign by\s*:\s*([\s\S]*?)Telephone\s*:/i
        ) || ['', ''])[1].trim();

        const report = `📋 Update
Zone : [ระบุ UBN/KKN]
JOB : ${job}

Title : ${title}

Assign To : ${name}
Tel. : ${tel}

:: Priority : ${priority}
:: Subsystem : ${subsystem}
:: Problem Type : ${problemType}
:: Problem Service : ${problemService}
:: Created : ${created}
:: Finish : ${finish}
:: Assign By : ${assignBy}
━━━━━━━━━━━━━━━━━━
:: Accept(Time) : [ระบุเวลา]
:: Depart(Time) : [ระบุเวลา]
:: เดินทาง : [ระบุระยะทาง] km.
━━━━━━━━━━━━━━━━━━
:: On Site : [ระบุเวลา]
:: (เจอแผล) : [ระบุ]
:: สาเหตุเสีย : [ระบุ]
:: Done : [ระบุ]

`;

        document.getElementById('edsReport').value = report;
      }

      function copyEDSReport() {
        const text = document.getElementById('edsReport').value;

        navigator.clipboard.writeText(text);

        alert('✅ คัดลอกรายงาน EDS แล้ว');
      }
      function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach((page) => {
          page.classList.remove('active');
        });

        document.getElementById(pageId).classList.add('active');

        document.querySelectorAll('.tab-btn').forEach((tab) => {
          tab.classList.remove('active');
        });

        btn.classList.add('active');
      }
      function clearEDS() {
        document.getElementById('rawText').value = '';
        document.getElementById('edsReport').value = '';

        alert('✅ ล้างข้อมูล EDS แล้ว');
      }
    </script>
  </body>
</html>
